<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            brand: { orange: '#FF7A00', bg: '#0B0B0B', card: '#141414', border: '#222222', muted: '#7F7F7F' }
          }
        }
      }
    }
  </script>
  <style>body { background-color: #0B0B0B; font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col pb-12">
  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <main class="container mx-auto px-4 mt-8 max-w-7xl flex-grow">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-white">Players</h1>
        <p class="text-brand-muted text-sm mt-1">Manage your registered athletes</p>
      </div>
      <button id="add-player-btn"
        class="bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-orange-500/15 active:scale-[0.98]">
        + Add Player
      </button>
    </div>

    <!-- Search -->
    <div class="relative mb-6">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-muted text-sm">🔍</span>
      <input id="search-input" type="text" placeholder="Search by name or team..."
        class="w-full bg-brand-card border border-brand-border rounded-xl pl-10 pr-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
    </div>

    <!-- Players List -->
    <div id="players-list"></div>

    <!-- Empty State -->
    <div id="players-empty" class="hidden bg-brand-card border border-brand-border rounded-2xl p-12 text-center shadow-2xl">
      <div class="text-5xl mb-4">👤</div>
      <h3 class="text-lg font-bold text-white">No players yet</h3>
      <p class="text-brand-muted text-sm mt-1 mb-5">Add players to your teams to start tracking performance.</p>
      <button class="bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm px-5 py-2.5 rounded-xl transition-all"
        onclick="document.getElementById('add-player-btn').click()">+ Add Player</button>
    </div>
  </main>

  <!-- Player Modal -->
  <div id="player-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm items-center justify-center px-4">
    <div class="bg-brand-card border border-brand-border rounded-2xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-6 border-b border-brand-border sticky top-0 bg-brand-card z-10">
        <h2 class="text-lg font-bold text-white" id="modal-title">Add Player</h2>
        <button class="modal-close text-brand-muted hover:text-white transition-colors text-xl leading-none">✕</button>
      </div>
      <form id="player-form" class="p-6 grid grid-cols-2 gap-4">
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Full Name *</label>
          <input id="player-name" type="text" placeholder="Player name" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
        </div>
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Age *</label>
          <input id="player-age" type="number" placeholder="e.g. 17" min="5" max="60" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
        </div>
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Role *</label>
          <select id="player-role" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-brand-orange transition-all">
            <option value="">Select role</option>
            <option>Batsman</option><option>Bowler</option>
            <option>All-Rounder</option><option>Wicketkeeper</option>
          </select>
        </div>
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Team *</label>
          <select id="player-team" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-brand-orange transition-all"></select>
        </div>
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Batting Style *</label>
          <select id="player-batting" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-brand-orange transition-all">
            <option value="">Select style</option>
            <option>Right-hand bat</option><option>Left-hand bat</option>
          </select>
        </div>
        <div class="col-span-2 sm:col-span-1">
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Bowling Style *</label>
          <select id="player-bowling" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-brand-orange transition-all">
            <option value="">Select style</option>
            <option>Right-arm fast</option><option>Right-arm medium</option>
            <option>Right-arm off-break</option><option>Left-arm fast</option>
            <option>Left-arm orthodox</option><option>None</option>
          </select>
        </div>
        <div class="col-span-2 flex gap-3 pt-2">
          <button type="button" class="btn-cancel flex-1 bg-brand-bg border border-brand-border text-gray-300 font-bold text-sm py-3 rounded-xl hover:border-gray-500 transition-all">Cancel</button>
          <button type="submit" class="flex-1 bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm py-3 rounded-xl transition-all">Save Player</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/players.js"></script>
</body>
</html>
