<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Players — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              gold: '#F5B041',
              bg: '#050505',
              card: '#0F1117',
              border: 'rgba(255, 255, 255, 0.07)',
              muted: '#B0B0B0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="app-shell text-gray-100 min-h-screen antialiased">

  <div id="navbar-placeholder"></div>

  <main class="app-main space-y-6">

    <div class="page-header">
      <div>
        <div class="page-eyebrow">Athlete Roster</div>
        <h1>Academy Players</h1>
        <p class="page-header-sub">Manage & track athlete details</p>
      </div>
      <button id="add-player-btn" class="btn-primary click-bounce">
        + Add Player
      </button>
    </div>

    <div class="search-wrapper">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search by name or squad..." class="app-input">
    </div>

    <div id="players-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

    <div id="players-empty" class="hidden glass-card empty-state">
      <div class="empty-state-icon">🏃</div>
      <h3>Roster is Empty</h3>
      <p>Add athletes to squads to begin grading practice (PPI) and match (MPI) performance index values.</p>
      <button class="btn-primary click-bounce" onclick="document.getElementById('add-player-btn').click()">+ Add Athlete</button>
    </div>

  </main>

  <div id="player-modal" class="hidden fixed inset-0 z-50 modal-overlay items-center justify-center px-4">
    <div class="glass-modal w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between p-6 border-b border-white/5 sticky top-0 bg-[#0a0b0f]/95 backdrop-blur-xl z-10">
        <div>
          <div class="page-eyebrow" style="margin-bottom:0.25rem;">Athlete</div>
          <h2 class="text-base font-black text-white" id="modal-title">Add Player</h2>
        </div>
        <button class="modal-close text-brand-muted hover:text-white transition-colors text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">✕</button>
      </div>
      <form id="player-form" class="p-6 flex flex-col gap-5">
        <div>
          <label class="app-label">Full Name *</label>
          <input id="player-name" type="text" placeholder="Player name" required class="app-input">
        </div>
        <div>
          <label class="app-label">Age *</label>
          <input id="player-age" type="number" placeholder="e.g. 17" min="5" max="60" required class="app-input">
        </div>
        <div>
          <label class="app-label">Role *</label>
          <select id="player-role" required class="app-select">
            <option value="">Select role</option>
            <option>Batsman</option>
            <option>Bowler</option>
            <option>All-Rounder</option>
            <option>Wicketkeeper</option>
          </select>
        </div>
        <div>
          <label class="app-label">Team *</label>
          <select id="player-team" required class="app-select"></select>
        </div>
        <div>
          <label class="app-label">Batting Style *</label>
          <select id="player-batting" required class="app-select">
            <option value="">Select style</option>
            <option>Right-hand bat</option>
            <option>Left-hand bat</option>
          </select>
        </div>
        <div>
          <label class="app-label">Bowling Style *</label>
          <select id="player-bowling" required class="app-select">
            <option value="">Select style</option>
            <option>Right-arm fast</option>
            <option>Right-arm medium</option>
            <option>Right-arm off-break</option>
            <option>Left-arm fast</option>
            <option>Left-arm orthodox</option>
            <option>None</option>
          </select>
        </div>
        <div class="flex gap-3 pt-1">
          <button type="button" class="btn-ghost flex-1 btn-cancel click-bounce">Cancel</button>
          <button type="submit" class="btn-primary flex-1 click-bounce">Save Player</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/players.js"></script>
</body>
</html>
