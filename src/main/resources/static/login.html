<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Login — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              gold: '#F5B041',
              bg: '#050505',
              card: '#0F1117',
              border: 'rgba(255, 255, 255, 0.07)',
              muted: '#B0B0B0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-100 min-h-screen antialiased">

  <div class="auth-page">
    <div class="auth-container">

      <div class="auth-status-bar">
        <span class="auth-status-label">CPI Platform</span>
        <span class="auth-live-dot"></span>
      </div>

      <div class="auth-logo">
        <div class="welcome-avatar mx-auto mb-4" style="width:72px;height:72px;font-size:2rem;">🏏</div>
        <h1>CPI<span>.</span></h1>
        <p>Cricket Performance Intelligence</p>
      </div>

      <div class="glass-card auth-card">
        <h2>Welcome Coach</h2>
        <p class="auth-subtitle">Sign in to your sports analytics command center</p>

        <div id="error-msg" class="hidden mb-4 bg-red-500/10 border border-red-500/25 text-red-400 text-xs rounded-xl px-4 py-3 font-semibold"></div>

        <form id="login-form" class="flex flex-col gap-5">
          <div>
            <label class="app-label" for="email">Email Address</label>
            <input id="email" type="email" placeholder="coach@academy.com" required class="app-input">
          </div>
          <div>
            <label class="app-label" for="password">Password</label>
            <input id="password" type="password" placeholder="••••••••" required class="app-input">
          </div>
          <button type="submit" id="submit-btn" class="btn-primary w-full click-bounce mt-1" style="padding:1rem;">
            Sign In
          </button>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account?
        <a href="signup.html">Create Account →</a>
      </div>

    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
