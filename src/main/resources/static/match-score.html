<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MPI Scoring — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              bg: '#060606',
              card: 'rgba(20, 20, 20, 0.6)',
              border: 'rgba(255, 255, 255, 0.08)',
              muted: '#8E8E93'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-100 min-h-screen bg-[#050505] flex justify-center items-stretch antialiased">

  <div class="w-full max-w-md md:max-w-lg min-h-screen bg-[#060606] flex flex-col justify-between pb-24 shadow-2xl relative border-x border-brand-border">
    
    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow px-4 pt-6 overflow-y-auto space-y-6">
      
      <!-- Back to list & title -->
      <div>
        <a href="match-sessions.html"
          class="inline-flex items-center gap-1.5 text-brand-orange hover:text-orange-400 text-[10px] font-black uppercase tracking-wider mb-3 transition-colors">
          ← Back to Matches
        </a>
        <h1 class="text-xl font-black text-white">MPI Grading</h1>
        <p class="text-[11px] text-brand-muted mt-0.5">Rate players across 5 match pillars (1-10)</p>
      </div>

      <!-- Score Cards List -->
      <div id="score-list" class="space-y-4"></div>

    </main>

  </div>

  <script type="module" src="js/match.js"></script>
</body>
</html>
