<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Teams — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              gold: '#F5B041',
              bg: '#050505',
              card: '#0F1117',
              border: 'rgba(255, 255, 255, 0.07)',
              muted: '#B0B0B0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="app-shell text-gray-100 min-h-screen antialiased">

  <div id="navbar-placeholder"></div>

  <main class="app-main space-y-6">

    <div class="page-header">
      <div>
        <div class="page-eyebrow">Squad Management</div>
        <h1>Academy Teams</h1>
        <p class="page-header-sub">Manage and organize your rosters</p>
      </div>
      <button id="add-team-btn" class="btn-primary click-bounce">
        + New Team
      </button>
    </div>

    <div class="search-wrapper">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search squads..." class="app-input">
    </div>

    <div id="teams-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

    <div id="teams-empty" class="hidden glass-card empty-state">
      <div class="empty-state-icon">🛡️</div>
      <h3>No Squads Registered</h3>
      <p>Create your first academy squad to start tracking performance indexes.</p>
      <button class="btn-primary click-bounce" onclick="document.getElementById('add-team-btn').click()">+ Create Team</button>
    </div>

  </main>

  <div id="team-modal" class="hidden fixed inset-0 z-50 modal-overlay items-center justify-center px-4">
    <div class="glass-modal w-full max-w-md shadow-2xl overflow-hidden">
      <div class="flex items-center justify-between p-6 border-b border-white/5">
        <div>
          <div class="page-eyebrow" style="margin-bottom:0.25rem;">Squad</div>
          <h2 class="text-base font-black text-white" id="modal-title">New Team</h2>
        </div>
        <button class="modal-close text-brand-muted hover:text-white transition-colors text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">✕</button>
      </div>
      <form id="team-form" class="p-6 flex flex-col gap-5">
        <div>
          <label class="app-label">Team Name *</label>
          <input id="team-name" type="text" placeholder="e.g. Under-19 Squad" required class="app-input">
        </div>
        <div>
          <label class="app-label">Description</label>
          <textarea id="team-desc" placeholder="Optional notes about this squad" rows="3" class="app-textarea resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-1">
          <button type="button" class="btn-ghost flex-1 btn-cancel click-bounce">Cancel</button>
          <button type="submit" class="btn-primary flex-1 click-bounce">Save Team</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/teams.js"></script>
</body>
</html>
