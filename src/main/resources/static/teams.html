<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            brand: { orange: '#FF7A00', bg: '#0B0B0B', card: '#141414', border: '#222222', muted: '#7F7F7F' }
          }
        }
      }
    }
  </script>
  <style>body { background-color: #0B0B0B; font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col pb-12">
  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <main class="container mx-auto px-4 mt-8 max-w-7xl flex-grow">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-white">Teams</h1>
        <p class="text-brand-muted text-sm mt-1">Create and manage your squads</p>
      </div>
      <button id="add-team-btn"
        class="bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-orange-500/15 active:scale-[0.98]">
        + New Team
      </button>
    </div>

    <!-- Search -->
    <div class="relative mb-6">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-muted text-sm">🔍</span>
      <input id="search-input" type="text" placeholder="Search teams..."
        class="w-full bg-brand-card border border-brand-border rounded-xl pl-10 pr-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
    </div>

    <!-- Teams List -->
    <div id="teams-list" class="flex flex-col gap-3"></div>

    <!-- Empty State -->
    <div id="teams-empty" class="hidden bg-brand-card border border-brand-border rounded-2xl p-12 text-center shadow-2xl">
      <div class="text-5xl mb-4">🛡️</div>
      <h3 class="text-lg font-bold text-white">No teams yet</h3>
      <p class="text-brand-muted text-sm mt-1 mb-5">Create your first squad to start managing players.</p>
      <button class="bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm px-5 py-2.5 rounded-xl transition-all"
        onclick="document.getElementById('add-team-btn').click()">+ New Team</button>
    </div>
  </main>

  <!-- Team Modal -->
  <div id="team-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm items-center justify-center px-4">
    <div class="bg-brand-card border border-brand-border rounded-2xl w-full max-w-md shadow-2xl">
      <div class="flex items-center justify-between p-6 border-b border-brand-border">
        <h2 class="text-lg font-bold text-white" id="modal-title">New Team</h2>
        <button class="modal-close text-brand-muted hover:text-white transition-colors text-xl leading-none">✕</button>
      </div>
      <form id="team-form" class="p-6 flex flex-col gap-5">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Team Name *</label>
          <input id="team-name" type="text" placeholder="e.g. Under-19 Squad" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Description</label>
          <textarea id="team-desc" placeholder="Optional notes about this team" rows="3"
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" class="btn-cancel flex-1 bg-brand-bg border border-brand-border text-gray-300 font-bold text-sm py-3 rounded-xl hover:border-gray-500 transition-all">Cancel</button>
          <button type="submit" class="flex-1 bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm py-3 rounded-xl transition-all">Save Team</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/teams.js"></script>
</body>
</html>
