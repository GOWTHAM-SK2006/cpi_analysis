<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams — CPI Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main class="container">
    <div class="page-header flex items-center justify-between">
      <div><h1>Teams</h1><p>Create and manage your squads</p></div>
      <button id="add-team-btn" class="btn btn-primary">+ New Team</button>
    </div>
    <div class="page-content">
      <div class="search-bar" style="margin-bottom:1.25rem;">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" class="form-control" placeholder="Search teams...">
      </div>
      <div id="teams-list" style="display:flex;flex-direction:column;gap:0.75rem;"></div>
      <div id="teams-empty" class="empty-state hidden">
        <div class="empty-icon">🛡</div>
        <h3>No teams yet</h3>
        <p>Create your first team to get started with player management.</p>
        <button class="btn btn-primary" onclick="document.getElementById('add-team-btn').click()">+ New Team</button>
      </div>
    </div>
  </main>

  <!-- Team Modal -->
  <div id="team-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">New Team</h2>
        <button class="modal-close">✕</button>
      </div>
      <form id="team-form">
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div class="form-group">
            <label class="form-label">Team Name *</label>
            <input id="team-name" type="text" class="form-control" placeholder="e.g. Under-19 Squad" required>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="team-desc" class="form-control" placeholder="Optional notes about this team"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Team</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/teams.js"></script>
</body>
</html>
