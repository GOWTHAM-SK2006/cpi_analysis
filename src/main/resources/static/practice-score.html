<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PPI Scoring — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              gold: '#F5B041',
              bg: '#050505',
              card: '#0F1117',
              border: 'rgba(255, 255, 255, 0.07)',
              muted: '#B0B0B0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="app-shell text-gray-100 min-h-screen antialiased">

  <div id="navbar-placeholder"></div>

  <main class="app-main space-y-6">

    <div class="page-header" style="display:block;border-bottom:none;padding-bottom:0;">
      <a href="practice-sessions.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to Sessions
      </a>
      <div class="page-eyebrow">PPI Grading</div>
      <h1>Practice Performance Index</h1>
      <p class="page-header-sub">Rate players across 5 practice pillars (1–10)</p>
    </div>

    <div id="score-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

  </main>

  <script type="module" src="js/practice.js"></script>
</body>
</html>
