<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Detail — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            brand: { orange: '#FF7A00', bg: '#0B0B0B', card: '#141414', border: '#222222', muted: '#7F7F7F' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0B0B0B; font-family: 'Outfit', sans-serif; }
    .custom-table th { background: #141414; color: #7F7F7F; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.75rem 1rem; border-bottom: 1px solid #222; }
    .custom-table td { padding: 0.75rem 1rem; border-bottom: 1px solid #1a1a1a; font-size: 0.85rem; color: #d1d5db; }
    .custom-table tr:last-child td { border-bottom: none; }
    .custom-table tr:hover td { background: rgba(255,122,0,0.03); }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col pb-12">
  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <main class="container mx-auto px-4 mt-8 max-w-7xl flex-grow">
    <!-- Back -->
    <a href="players.html"
      class="inline-flex items-center gap-1.5 text-brand-orange hover:text-orange-400 text-xs font-bold mb-6 transition-colors">
      ← Back to Players
    </a>

    <!-- Player Header -->
    <div id="player-header" class="mb-8"></div>

    <!-- Player Content -->
    <div id="player-content">
      <div class="flex items-center justify-center py-24 text-brand-muted text-sm">
        <span class="animate-pulse">Loading player data...</span>
      </div>
    </div>
  </main>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { api } from './js/api.js';
    import { renderNavbar, formatScore, scoreColor } from './js/layout.js';

    requireAuth();
    renderNavbar('players.html');

    const playerId = new URLSearchParams(window.location.search).get('id');
    if (!playerId) { window.location.href = 'players.html'; }

    async function load() {
      const d = await api.reports.player(playerId);
      document.title = `${d.name} — CPI`;

      // Render header
      document.getElementById('player-header').innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">${d.name}</h1>
            <p class="text-sm text-brand-muted mt-1 font-semibold">
              ${d.role}
              <span class="mx-2 text-brand-border">·</span>${d.teamName}
              <span class="mx-2 text-brand-border">·</span>Age ${d.age}
              <span class="mx-2 text-brand-border">·</span>${d.battingStyle}
              <span class="mx-2 text-brand-border">·</span>${d.bowlingStyle}
            </p>
          </div>
        </div>`;

      // Score boxes
      const scoreBox = (label, val, sub) => `
        <div class="bg-brand-card border border-brand-border rounded-2xl p-6 text-center transition-all hover:border-brand-orange/40 duration-300">
          <div class="text-xs font-bold uppercase tracking-widest text-brand-muted mb-2">${label}</div>
          <div class="text-4xl font-black" style="color:${scoreColor(val)}">${formatScore(val)}</div>
          <div class="text-xs text-brand-muted mt-1">${sub}</div>
        </div>`;

      // Table rows
      const ppiRows = d.ppiHistory.length
        ? d.ppiHistory.map(s => `
            <tr>
              <td class="font-semibold text-white">Session #${s.practiceSessionId}</td>
              <td>${s.trainingIntensity}</td><td>${s.skillExecution}</td>
              <td>${s.focus}</td><td>${s.coachability}</td><td>${s.adaptability}</td>
              <td class="font-extrabold" style="color:${scoreColor(s.ppi)}">${s.ppi.toFixed(1)}</td>
            </tr>`).join('')
        : `<tr><td colspan="7" class="text-center py-8 text-brand-muted">No practice scores yet</td></tr>`;

      const mpiRows = d.mpiHistory.length
        ? d.mpiHistory.map(s => `
            <tr>
              <td class="font-semibold text-white">Match #${s.matchSessionId}</td>
              <td>${s.technicalExecution}</td><td>${s.decisionMaking}</td>
              <td>${s.matchAwareness}</td><td>${s.mentalResilience}</td><td>${s.competitiveImpact}</td>
              <td class="font-extrabold" style="color:${scoreColor(s.mpi)}">${s.mpi.toFixed(1)}</td>
            </tr>`).join('')
        : `<tr><td colspan="7" class="text-center py-8 text-brand-muted">No match scores yet</td></tr>`;

      document.getElementById('player-content').innerHTML = `
        <!-- KPI Scores -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">
          ${scoreBox('CPI', d.cpi, 'Combined Index')}
          ${scoreBox('PPI', d.averagePpi, 'Practice avg')}
          ${scoreBox('MPI', d.averageMpi, 'Match avg')}
        </div>

        <!-- PPI History -->
        <div class="bg-brand-card border border-brand-border rounded-2xl mb-6 overflow-hidden">
          <div class="px-6 py-5 border-b border-brand-border">
            <h2 class="text-base font-bold text-white">Practice Performance History <span class="text-brand-orange ml-1">(PPI)</span></h2>
            <p class="text-xs text-brand-muted mt-0.5">${d.ppiHistory.length} session${d.ppiHistory.length !== 1 ? 's' : ''} logged</p>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full custom-table">
              <thead>
                <tr>
                  <th>Session</th><th>Intensity</th><th>Skill</th>
                  <th>Focus</th><th>Coachability</th><th>Adaptability</th><th>PPI</th>
                </tr>
              </thead>
              <tbody>${ppiRows}</tbody>
            </table>
          </div>
        </div>

        <!-- MPI History -->
        <div class="bg-brand-card border border-brand-border rounded-2xl overflow-hidden">
          <div class="px-6 py-5 border-b border-brand-border">
            <h2 class="text-base font-bold text-white">Match Performance History <span class="text-brand-orange ml-1">(MPI)</span></h2>
            <p class="text-xs text-brand-muted mt-0.5">${d.mpiHistory.length} match${d.mpiHistory.length !== 1 ? 'es' : ''} scored</p>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full custom-table">
              <thead>
                <tr>
                  <th>Match</th><th>Technical</th><th>Decision</th>
                  <th>Awareness</th><th>Resilience</th><th>Impact</th><th>MPI</th>
                </tr>
              </thead>
              <tbody>${mpiRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    load().catch(err => {
      document.getElementById('player-content').innerHTML = `
        <div class="bg-brand-card border border-brand-border rounded-2xl p-12 text-center">
          <div class="text-5xl mb-4">⚠️</div>
          <h3 class="text-lg font-bold text-white">Failed to load player</h3>
          <p class="text-brand-muted text-sm mt-1">${err.message}</p>
        </div>`;
    });
  </script>
</body>
</html>
