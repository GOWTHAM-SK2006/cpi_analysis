<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Player Detail — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              gold: '#F5B041',
              bg: '#050505',
              card: '#0F1117',
              border: 'rgba(255, 255, 255, 0.07)',
              muted: '#B0B0B0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="app-shell text-gray-100 min-h-screen antialiased">

  <div id="navbar-placeholder"></div>

  <main class="app-main space-y-6">

    <div class="page-header" style="display:block;border-bottom:none;padding-bottom:0;">
      <a href="players.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
        Back to Players
      </a>
      <div id="player-header">
        <div class="skeleton h-8 w-64 rounded-xl mb-2"></div>
        <div class="skeleton h-4 w-80 rounded-xl"></div>
      </div>
    </div>

    <div id="player-content">
      <div class="glass-card empty-state" style="min-height:240px;">
        <div class="empty-state-icon" style="animation:none;width:56px;height:56px;font-size:1.5rem;">⏳</div>
        <p class="text-brand-muted text-sm">Loading athlete data...</p>
      </div>
    </div>

  </main>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { api } from './js/api.js';
    import { renderNavbar, formatScore, scoreColor } from './js/layout.js';

    try { requireAuth(); } catch(e) {}
    renderNavbar('players.html');

    const playerId = new URLSearchParams(window.location.search).get('id');
    if (!playerId) { window.location.href = 'players.html'; }

    async function load() {
      const d = await api.reports.player(playerId);
      document.title = `${d.name} — CPI`;

      document.getElementById('player-header').innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
          <div>
            <h1 class="text-2xl md:text-3xl font-black text-white tracking-tight">${d.name}</h1>
            <p class="text-xs text-brand-muted mt-1 font-bold uppercase tracking-wider">
              ${d.role}
              <span class="mx-2 text-white/10">|</span>${d.teamName}
              <span class="mx-2 text-white/10">|</span>Age ${d.age}
              <span class="mx-2 text-white/10">|</span>${d.battingStyle}
              <span class="mx-2 text-white/10">|</span>${d.bowlingStyle}
            </p>
          </div>
        </div>`;

      const scoreBox = (label, val, sub) => `
        <div class="glass-card p-6 md:p-8 text-center hover:border-brand-orange/30 transition-all">
          <div class="text-[10px] font-black uppercase tracking-widest text-brand-muted mb-3">${label}</div>
          <div class="text-4xl font-black" style="color:${scoreColor(val)}">${formatScore(val)}</div>
          <div class="text-[10px] text-brand-muted mt-2 font-bold uppercase tracking-wider">${sub}</div>
        </div>`;

      const thClass = "px-4 py-3 text-[10px] font-black uppercase tracking-widest text-brand-muted text-left bg-[#0d0d0d] border-b border-white/5";
      const tdClass = "px-4 py-3 text-xs border-b border-white/5 text-gray-300";

      const ppiRows = d.ppiHistory.length
        ? d.ppiHistory.map(s => `
          <tr class="hover:bg-white/[0.02] transition-colors">
            <td class="${tdClass} font-bold text-white">Session #${s.practiceSessionId}</td>
            <td class="${tdClass}">${s.trainingIntensity}</td>
            <td class="${tdClass}">${s.skillExecution}</td>
            <td class="${tdClass}">${s.focus}</td>
            <td class="${tdClass}">${s.coachability}</td>
            <td class="${tdClass}">${s.adaptability}</td>
            <td class="${tdClass} font-black text-right" style="color:${scoreColor(s.ppi)}">${s.ppi.toFixed(1)}</td>
          </tr>`).join('')
        : `<tr><td colspan="7" class="${tdClass} text-center py-10 text-brand-muted">No practice scores logged yet</td></tr>`;

      const mpiRows = d.mpiHistory.length
        ? d.mpiHistory.map(s => `
          <tr class="hover:bg-white/[0.02] transition-colors">
            <td class="${tdClass} font-bold text-white">Match #${s.matchSessionId}</td>
            <td class="${tdClass}">${s.technicalExecution}</td>
            <td class="${tdClass}">${s.decisionMaking}</td>
            <td class="${tdClass}">${s.matchAwareness}</td>
            <td class="${tdClass}">${s.mentalResilience}</td>
            <td class="${tdClass}">${s.competitiveImpact}</td>
            <td class="${tdClass} font-black text-right" style="color:${scoreColor(s.mpi)}">${s.mpi.toFixed(1)}</td>
          </tr>`).join('')
        : `<tr><td colspan="7" class="${tdClass} text-center py-10 text-brand-muted">No match scores logged yet</td></tr>`;

      document.getElementById('player-content').innerHTML = `
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 md:gap-6">
          ${scoreBox('CPI', d.cpi, 'Combined Performance Index')}
          ${scoreBox('PPI', d.averagePpi, 'Practice Average')}
          ${scoreBox('MPI', d.averageMpi, 'Match Average')}
        </div>

        <div class="glass-card overflow-hidden">
          <div class="px-6 py-5 border-b border-white/5 flex items-center justify-between">
            <div>
              <h2 class="text-sm font-black text-white uppercase tracking-wider">
                Practice History <span class="text-brand-orange ml-1">(PPI)</span>
              </h2>
              <p class="text-xs text-brand-muted mt-0.5">${d.ppiHistory.length} session${d.ppiHistory.length !== 1 ? 's' : ''} logged</p>
            </div>
            <span class="text-[9px] bg-brand-orange/10 border border-brand-orange/20 text-brand-orange px-3 py-1.5 rounded-xl font-black uppercase tracking-wider">PPI</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr>
                  <th class="${thClass}">Session</th>
                  <th class="${thClass}">Intensity</th>
                  <th class="${thClass}">Skill</th>
                  <th class="${thClass}">Focus</th>
                  <th class="${thClass}">Coachability</th>
                  <th class="${thClass}">Adaptability</th>
                  <th class="${thClass} text-right">PPI</th>
                </tr>
              </thead>
              <tbody>${ppiRows}</tbody>
            </table>
          </div>
        </div>

        <div class="glass-card overflow-hidden">
          <div class="px-6 py-5 border-b border-white/5 flex items-center justify-between">
            <div>
              <h2 class="text-sm font-black text-white uppercase tracking-wider">
                Match History <span class="text-gray-300 ml-1">(MPI)</span>
              </h2>
              <p class="text-xs text-brand-muted mt-0.5">${d.mpiHistory.length} match${d.mpiHistory.length !== 1 ? 'es' : ''} scored</p>
            </div>
            <span class="text-[9px] bg-white/5 border border-white/5 text-gray-300 px-3 py-1.5 rounded-xl font-black uppercase tracking-wider">MPI</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead>
                <tr>
                  <th class="${thClass}">Match</th>
                  <th class="${thClass}">Technical</th>
                  <th class="${thClass}">Decision</th>
                  <th class="${thClass}">Awareness</th>
                  <th class="${thClass}">Resilience</th>
                  <th class="${thClass}">Impact</th>
                  <th class="${thClass} text-right">MPI</th>
                </tr>
              </thead>
              <tbody>${mpiRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    load().catch(err => {
      document.getElementById('player-content').innerHTML = `
        <div class="glass-card p-12 text-center">
          <div class="text-4xl mb-4">⚠️</div>
          <h3 class="text-sm font-black text-white uppercase tracking-wider">Failed to Load Player</h3>
          <p class="text-xs text-brand-muted mt-2">${err.message}</p>
        </div>`;
    });
  </script>
</body>
</html>
