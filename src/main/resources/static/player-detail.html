<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Player Detail — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              bg: '#060606',
              card: 'rgba(20, 20, 20, 0.6)',
              border: 'rgba(255, 255, 255, 0.08)',
              muted: '#8E8E93'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-100 min-h-screen bg-[#050505] flex justify-center items-stretch antialiased">

  <div class="w-full max-w-md md:max-w-lg min-h-screen bg-[#060606] flex flex-col justify-between pb-24 shadow-2xl relative border-x border-brand-border">
    
    <!-- Header Placeholder -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow px-4 pt-6 overflow-y-auto space-y-6">
      
      <!-- Back button and bio header -->
      <div>
        <a href="players.html"
          class="inline-flex items-center gap-1.5 text-brand-orange hover:text-orange-400 text-[10px] font-black uppercase tracking-wider mb-3 transition-colors">
          ← Back to Players
        </a>
        <div id="player-header">
          <!-- Bio details populated dynamically -->
          <div class="skeleton h-4 w-40 rounded mb-1.5"></div>
          <div class="skeleton h-2 w-2/3 rounded"></div>
        </div>
      </div>

      <!-- Detail scores and histories -->
      <div id="player-content" class="space-y-6">
        <div class="flex items-center justify-center py-20 text-brand-muted text-xs">
          <span class="animate-pulse">Loading athlete data...</span>
        </div>
      </div>

    </main>

  </div>

  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { api } from './js/api.js';
    import { renderNavbar, formatScore, scoreColor } from './js/layout.js';

    // Enforce authentication
    try {
      requireAuth();
    } catch(e) {}

    renderNavbar('players.html');

    const playerId = new URLSearchParams(window.location.search).get('id');
    if (!playerId) { window.location.href = 'players.html'; }

    async function load() {
      const d = await api.reports.player(playerId);
      document.title = `${d.name} — CPI`;

      // Render header details
      document.getElementById('player-header').innerHTML = `
        <h1 class="text-xl font-black text-white">${d.name}</h1>
        <p class="text-[10px] text-brand-muted mt-0.5 font-bold uppercase tracking-wider">
          ${d.role} · ${d.teamName} · Age ${d.age}
        </p>
        <p class="text-[9px] text-brand-muted mt-0.5 font-bold uppercase tracking-wider">
          🏏 ${d.battingStyle} · ⚾ ${d.bowlingStyle}
        </p>`;

      // Score box template
      const scoreBox = (label, val, sub) => `
        <div class="glass-card p-4 text-center border border-brand-border flex-1">
          <div class="text-[9px] font-bold uppercase tracking-wider text-brand-muted mb-1">${label}</div>
          <div class="text-2xl font-black" style="color:${scoreColor(val)}">${formatScore(val)}</div>
          <div class="text-[8px] text-brand-muted mt-0.5">${sub}</div>
        </div>`;

      // Table cell helpers
      const tdClass = "px-3 py-2 text-xs border-b border-brand-border/40 text-gray-300";
      const thClass = "px-3 py-1.5 text-[9px] font-black uppercase text-brand-muted bg-[#0d0d0d] border-b border-brand-border/60 text-left";

      // Practice table rows
      const ppiRows = d.ppiHistory.length
        ? d.ppiHistory.map(s => `
            <tr>
              <td class="${tdClass} font-bold text-white">S#${s.practiceSessionId}</td>
              <td class="${tdClass}">${s.trainingIntensity}</td>
              <td class="${tdClass}">${s.focus}</td>
              <td class="${tdClass}">${s.coachability}</td>
              <td class="${tdClass} font-black" style="color:${scoreColor(s.ppi)}">${s.ppi.toFixed(1)}</td>
            </tr>`).join('')
        : `<tr><td colspan="5" class="${tdClass} text-center py-6 text-brand-muted">No practice scores logged</td></tr>`;

      // Match table rows
      const mpiRows = d.mpiHistory.length
        ? d.mpiHistory.map(s => `
            <tr>
              <td class="${tdClass} font-bold text-white">M#${s.matchSessionId}</td>
              <td class="${tdClass}">${s.technicalExecution}</td>
              <td class="${tdClass}">${s.mentalResilience}</td>
              <td class="${tdClass}">${s.competitiveImpact}</td>
              <td class="${tdClass} font-black" style="color:${scoreColor(s.mpi)}">${s.mpi.toFixed(1)}</td>
            </tr>`).join('')
        : `<tr><td colspan="5" class="${tdClass} text-center py-6 text-brand-muted">No match scores logged</td></tr>`;

      document.getElementById('player-content').innerHTML = `
        <!-- KPI score widgets -->
        <div class="flex gap-2">
          ${scoreBox('CPI', d.cpi, 'Combined')}
          ${scoreBox('PPI', d.averagePpi, 'Practice Avg')}
          ${scoreBox('MPI', d.averageMpi, 'Match Avg')}
        </div>

        <!-- Practice (PPI) history -->
        <div class="glass-card border border-brand-border overflow-hidden">
          <div class="px-4 py-3 border-b border-brand-border flex justify-between items-center">
            <div>
              <h3 class="text-xs font-bold text-white uppercase tracking-wider">Practice Logs (PPI)</h3>
              <p class="text-[9px] text-brand-muted mt-0.5">${d.ppiHistory.length} logs recorded</p>
            </div>
            <span class="text-[9px] bg-brand-orange/10 border border-brand-orange/20 text-brand-orange px-2 py-0.5 rounded font-bold">PPI</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr>
                  <th class="${thClass}">Log</th>
                  <th class="${thClass}">Intensity</th>
                  <th class="${thClass}">Focus</th>
                  <th class="${thClass}">Coach</th>
                  <th class="${thClass}">Score</th>
                </tr>
              </thead>
              <tbody>${ppiRows}</tbody>
            </table>
          </div>
        </div>

        <!-- Match (MPI) history -->
        <div class="glass-card border border-brand-border overflow-hidden">
          <div class="px-4 py-3 border-b border-brand-border flex justify-between items-center">
            <div>
              <h3 class="text-xs font-bold text-white uppercase tracking-wider">Match Logs (MPI)</h3>
              <p class="text-[9px] text-brand-muted mt-0.5">${d.mpiHistory.length} logs recorded</p>
            </div>
            <span class="text-[9px] bg-gray-400/10 border border-gray-400/20 text-gray-300 px-2 py-0.5 rounded font-bold">MPI</span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr>
                  <th class="${thClass}">Log</th>
                  <th class="${thClass}">Tech</th>
                  <th class="${thClass}">Resil</th>
                  <th class="${thClass}">Impact</th>
                  <th class="${thClass}">Score</th>
                </tr>
              </thead>
              <tbody>${mpiRows}</tbody>
            </table>
          </div>
        </div>`;
    }

    load().catch(err => {
      document.getElementById('player-content').innerHTML = `
        <div class="glass-card p-8 text-center border border-brand-border">
          <div class="text-4xl mb-3">⚠️</div>
          <h3 class="text-xs font-bold text-white uppercase tracking-wider">Loading Error</h3>
          <p class="text-[10px] text-brand-muted mt-2">${err.message}</p>
        </div>`;
    });
  </script>
</body>
</html>
