<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Sessions — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            brand: { orange: '#FF7A00', bg: '#0B0B0B', card: '#141414', border: '#222222', muted: '#7F7F7F' }
          }
        }
      }
    }
  </script>
  <style>body { background-color: #0B0B0B; font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col pb-12">
  <div id="navbar-placeholder" class="sticky top-0 z-50"></div>

  <main class="container mx-auto px-4 mt-8 max-w-7xl flex-grow">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight text-white">Practice Sessions</h1>
        <p class="text-brand-muted text-sm mt-1">Log training sessions and score players</p>
      </div>
      <button id="add-session-btn"
        class="bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-orange-500/15 active:scale-[0.98]">
        + New Session
      </button>
    </div>

    <!-- Sessions List -->
    <div id="sessions-list" class="flex flex-col gap-3"></div>

    <!-- Empty State -->
    <div id="sessions-empty" class="hidden bg-brand-card border border-brand-border rounded-2xl p-12 text-center shadow-2xl">
      <div class="text-5xl mb-4">🎯</div>
      <h3 class="text-lg font-bold text-white">No practice sessions yet</h3>
      <p class="text-brand-muted text-sm mt-1 mb-5">Create a session after each training day, then score your players.</p>
      <button class="bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm px-5 py-2.5 rounded-xl transition-all"
        onclick="document.getElementById('add-session-btn').click()">+ New Session</button>
    </div>
  </main>

  <!-- Session Modal -->
  <div id="session-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm items-center justify-center px-4">
    <div class="bg-brand-card border border-brand-border rounded-2xl w-full max-w-md shadow-2xl">
      <div class="flex items-center justify-between p-6 border-b border-brand-border">
        <h2 class="text-lg font-bold text-white">New Practice Session</h2>
        <button class="modal-close text-brand-muted hover:text-white transition-colors text-xl leading-none">✕</button>
      </div>
      <form id="session-form" class="p-6 flex flex-col gap-5">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Team *</label>
          <select id="session-team" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-brand-orange transition-all"></select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Date *</label>
          <input id="session-date" type="date" required
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-brand-orange transition-all [color-scheme:dark]">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-brand-muted mb-2">Notes</label>
          <textarea id="session-notes" placeholder="Optional session notes..." rows="3"
            class="w-full bg-brand-bg border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" class="btn-cancel flex-1 bg-brand-bg border border-brand-border text-gray-300 font-bold text-sm py-3 rounded-xl hover:border-gray-500 transition-all">Cancel</button>
          <button type="submit" class="flex-1 bg-brand-orange hover:bg-orange-600 text-white font-extrabold text-sm py-3 rounded-xl transition-all">Create Session</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/practice.js"></script>
</body>
</html>
