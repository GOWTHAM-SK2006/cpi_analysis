<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Practice Sessions — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              gold: '#F5B041',
              bg: '#050505',
              card: '#0F1117',
              border: 'rgba(255, 255, 255, 0.07)',
              muted: '#B0B0B0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="app-shell text-gray-100 min-h-screen antialiased">

  <div id="navbar-placeholder"></div>

  <main class="app-main space-y-6">

    <div class="page-header">
      <div>
        <div class="page-eyebrow">Training Intelligence</div>
        <h1>Practice Sessions</h1>
        <p class="page-header-sub">Log training dates and rate PPI performance</p>
      </div>
      <button id="add-session-btn" class="btn-primary click-bounce">
        + New Practice
      </button>
    </div>

    <div id="sessions-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

    <div id="sessions-empty" class="hidden glass-card empty-state">
      <div class="empty-state-icon">🎯</div>
      <h3>No Practices Logged</h3>
      <p>Create a workout log after training, then grade players across Intensity and Focus pillars.</p>
      <button class="btn-primary click-bounce" onclick="document.getElementById('add-session-btn').click()">+ Log Practice</button>
    </div>

  </main>

  <div id="session-modal" class="hidden fixed inset-0 z-50 modal-overlay items-center justify-center px-4">
    <div class="glass-modal w-full max-w-md shadow-2xl overflow-hidden">
      <div class="flex items-center justify-between p-6 border-b border-white/5">
        <div>
          <div class="page-eyebrow" style="margin-bottom:0.25rem;">Practice</div>
          <h2 class="text-base font-black text-white">New Practice Session</h2>
        </div>
        <button class="modal-close text-brand-muted hover:text-white transition-colors text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">✕</button>
      </div>
      <form id="session-form" class="p-6 flex flex-col gap-5">
        <div>
          <label class="app-label">Team *</label>
          <select id="session-team" required class="app-select"></select>
        </div>
        <div>
          <label class="app-label">Date *</label>
          <input id="session-date" type="date" required class="app-input [color-scheme:dark]">
        </div>
        <div>
          <label class="app-label">Notes</label>
          <textarea id="session-notes" placeholder="Optional notes (e.g. wet weather training)..." rows="3" class="app-textarea resize-none"></textarea>
        </div>
        <div class="flex gap-3 pt-1">
          <button type="button" class="btn-ghost flex-1 btn-cancel click-bounce">Cancel</button>
          <button type="submit" class="btn-primary flex-1 click-bounce">Save Log</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/practice.js"></script>
</body>
</html>
