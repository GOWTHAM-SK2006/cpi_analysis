<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sign Up — CPI Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF7A00',
              orangeHover: '#E06B00',
              bg: '#060606',
              card: 'rgba(20, 20, 20, 0.6)',
              border: 'rgba(255, 255, 255, 0.08)',
              muted: '#8E8E93'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="text-gray-100 min-h-screen bg-[#050505] flex justify-center items-stretch antialiased">
  
  <div class="w-full max-w-md md:max-w-lg min-h-screen bg-[#060606] flex flex-col justify-between p-6 shadow-2xl relative border-x border-brand-border">
    
    <div class="flex justify-between items-center mt-4">
      <div class="text-xs font-black tracking-widest text-brand-orange uppercase">CPI Platform</div>
      <div class="w-2.5 h-2.5 rounded-full bg-brand-orange pulse-glow"></div>
    </div>

    <div class="my-auto py-8">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-black tracking-tight text-white select-none">
          CPI<span class="text-brand-orange">.</span>
        </h1>
        <p class="text-brand-muted text-xs font-semibold uppercase tracking-widest mt-2">Cricket Performance Index</p>
      </div>

      <div class="glass-card p-6 border border-brand-border">
        <h2 class="text-xl font-bold text-white mb-1">Create Account</h2>
        <p class="text-brand-muted text-xs mb-6">Register your academy and track performance</p>

        <div id="error-msg" class="hidden mb-4 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-xl px-4 py-3 font-semibold"></div>

        <form id="signup-form" class="flex flex-col gap-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-brand-muted mb-1.5" for="name">Full Name</label>
              <input id="name" type="text" placeholder="Coach Name" required
                class="w-full bg-[#0d0d0d] border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
            </div>
            <div>
              <label class="block text-[10px] font-bold uppercase tracking-wider text-brand-muted mb-1.5" for="academy">Academy</label>
              <input id="academy" type="text" placeholder="Academy Name" required
                class="w-full bg-[#0d0d0d] border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-brand-muted mb-1.5" for="email">Email Address</label>
            <input id="email" type="email" placeholder="coach@academy.com" required
              class="w-full bg-[#0d0d0d] border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
          </div>
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-brand-muted mb-1.5" for="password">Password</label>
            <input id="password" type="password" placeholder="Min 6 characters" required minlength="6"
              class="w-full bg-[#0d0d0d] border border-brand-border rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-gray-600 focus:outline-none focus:border-brand-orange transition-all">
          </div>
          <button type="submit" id="submit-btn"
            class="w-full bg-brand-orange hover:bg-brand-orangeHover text-white font-black text-xs uppercase tracking-wider py-4 rounded-xl transition-all shadow-lg shadow-brand-orange/15 click-bounce mt-2">
            Create Account
          </button>
        </form>
      </div>
    </div>

    <div class="text-center pb-4">
      <p class="text-xs text-brand-muted">
        Already have an account?
        <a href="login.html" class="text-brand-orange font-bold hover:underline ml-1">Sign In →</a>
      </p>
    </div>

  </div>

  <script type="module">
    import { api } from './js/api.js';
    import { saveSession, redirectIfLoggedIn } from './js/auth.js';

    redirectIfLoggedIn();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      btn.textContent = 'Creating...'; btn.disabled = true;
      errEl.classList.add('hidden');
      try {
        const data = await api.auth.signup({
          name: document.getElementById('name').value.trim(),
          academyName: document.getElementById('academy').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        });
        saveSession(data);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Signup failed';
        errEl.classList.remove('hidden');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
